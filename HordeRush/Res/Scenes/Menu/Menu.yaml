- type: Menu
  name: Menu
  parent: null

- type: AudioPlayer
  name: ThemePlayer
  parent: Menu
  Audio: Res/Audio/Music/Menu.mp3
  AutoPlay: true

- type: ColorRectangle
  name: Background
  parent: Menu
  Color: "(0,0,0,255)"

- type: Button
  name: StartButton
  parent: Menu
  Position: "(100,100)"
  Text: Start

- type: Player
  name: CoolPlayer
  parent: Menu
  path: "Res/Scenes/Player.yaml"

- type: Gun
  name: Gun
  parent: Player
  InheritScale: false
  Scale: "(0.05,0.05)"
  Texture: "Res/Sprites/Gun.png"
  FlipH: true

- type: RayCast
  name: RayCast
  parent: Gun
  Length: 5000
  IgnoreFirst: true